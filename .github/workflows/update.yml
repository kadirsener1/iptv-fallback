name: Update M3U

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v3

      - name: M3U indir
        run: curl -L -o playlist.m3u https://34.magnitude.workers.dev/playlist.m3u

      - name: Değişiklik var mı kontrol et
        run: |
          if git diff --quiet; then
            echo "Değişiklik yok"
            exit 0
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add playlist.m3u
          git commit -m "Auto update M3U"
          git push

    
